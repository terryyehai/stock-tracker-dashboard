<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股黑馬追蹤系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .header p { opacity: 0.7; }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        .stat-card .value { font-size: 2rem; font-weight: bold; }
        .stat-card .label { opacity: 0.7; margin-top: 5px; }
        .category-section {
            margin-bottom: 40px;
        }
        .category-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            padding: 10px 20px;
            border-left: 4px solid;
            border-radius: 0 10px 10px 0;
        }
        .category-title.black-horse { border-color: #ffd700; background: rgba(255,215,0,0.1); }
        .category-title.growth { border-color: #00d4ff; background: rgba(0,212,255,0.1); }
        .category-title.dividend { border-color: #ff6b6b; background: rgba(255,107,107,0.1); }
        .category-title.value { border-color: #4ecdc4; background: rgba(78,205,196,0.1); }

        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }
        .stock-card {
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            padding: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        .stock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .stock-name { font-size: 1.3rem; font-weight: bold; }
        .stock-code { opacity: 0.6; font-size: 0.9rem; }
        .stock-price { font-size: 2rem; font-weight: bold; margin: 10px 0; }
        .price-up { color: #4ade80; }
        .price-down { color: #f87171; }
        .stock-metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            font-size: 0.9rem;
        }
        .metric { display: flex; justify-content: space-between; }
        .metric-label { opacity: 0.6; }
        .changes {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .change-tag {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .change-1d.positive { background: rgba(74,222,128,0.2); color: #4ade80; }
        .change-1d.negative { background: rgba(248,113,113,0.2); color: #f87171; }

        .chart-container {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            .stock-grid { grid-template-columns: 1fr; }
        }

        .last-update {
            text-align: center;
            opacity: 0.5;
            margin-top: 30px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎯 台股黑馬追蹤系統</h1>

</body>
</html>
